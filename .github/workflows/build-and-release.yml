name: Build and Release Signed APK

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*' # 触发标签，例如 v1.0.0
  repository_dispatch:
    types: [rust-lib-updated] # 修复：加了空格，接收来自 Rust 库发出的更新信号

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ⚠️ 必须为 0，拉取所有 Git 历史，以便准确获取 Tag 和 Hash

      # 1. 动态获取版本号并统一格式
      - name: Prepare Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取当前代码的 Git 短哈希 (前 7 位)
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # 统一从 gradle.properties 读取 Rust 库版本，避免与代码声明脱节
          RUST_TAG=$(grep "rust_libs_version" gradle.properties | cut -d'=' -f2 | xargs)

          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            # ===== 场景 A：Rust库更新触发（仅作为构建触发，不覆盖本地版本声明） =====
            APP_CODE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "master")
          else
            # ===== 场景 B：App 仓库手动推 Tag (v*) 触发 =====
            APP_CODE_VERSION="${{ github.ref_name }}"
          fi
          
          # 组合最终的 Release 标签 
          FINAL_RELEASE_TAG="${APP_CODE_VERSION}_rust-${RUST_TAG}-umi"
          
          # 写入环境变量
          echo "RUST_TAG=$RUST_TAG" >> $GITHUB_ENV
          echo "APP_CODE_VERSION=$APP_CODE_VERSION" >> $GITHUB_ENV
          echo "FINAL_RELEASE_TAG=$FINAL_RELEASE_TAG" >> $GITHUB_ENV
          
          echo "✅ RUST库版本: $RUST_TAG"
          echo "✅ APP代码版本: $APP_CODE_VERSION"
          echo "🚀 最终生成的 Release 标签: $FINAL_RELEASE_TAG"

      # 2. 设置 JDK 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 下载后端 Rust 编译好的 .so 产物（4 种架构）
      - name: Fetch Rust Binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64" "x86")
          for ABI in "${ABIS[@]}"; do
            TARGET_DIR="app/src/main/jniLibs/$ABI"
            mkdir -p "$TARGET_DIR"
            
            echo "正在下载 $ABI 架构的动态库..."
            # 使用 gradle.properties 中声明的版本，避免自动跟随最新 Rust Release
            gh release download ${{ env.RUST_TAG }} \
              --repo birchtree2/ktv-casting \
              --pattern "libktv_casting_lib-$ABI.so" \
              --dir "$TARGET_DIR"
              
            # 下载后重命名，去掉名字里的架构后缀，使其符合 Android JNI 规范
            mv "$TARGET_DIR/libktv_casting_lib-$ABI.so" "$TARGET_DIR/libktv_casting_lib.so"
          done

      # 4. 还原签名文件
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      # 5. 执行打包任务
      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          # 注意：如果你的打包命令不是自定义的 packRelease，请改为 assembleRelease
          ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.jks" \
          -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
          -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
          -Papp_version_name="${{ env.APP_CODE_VERSION }}"
          
      # 6. 创建 GitHub Release 
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.FINAL_RELEASE_TAG }} 
          # 注意：请核对这里的路径，默认通常是 app/build/outputs/apk/release/*.apk
          files: app/build/outputs/apk/release/*.apk 
          generate_release_notes: true
          body: |
            ### KTV Casting Android App Release
            - **App Version**: `${{ env.APP_CODE_VERSION }}`
            - **Rust Engine Version**: `${{ env.RUST_TAG }}`
            - **Trigger Type**: `${{ github.event_name == 'repository_dispatch' && 'Auto by Rust Update' || 'Manual Tag Push' }}`